 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POSV.1 Lite - Custom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; width: 100%; }
        * { box-sizing: border-box; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .section-content { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #modal-calculo { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">

    <nav class="glass sticky top-0 z-50 border-b border-slate-200 shadow-sm">
        <div class="flex overflow-x-auto justify-around max-w-5xl mx-auto px-2">
            <button onclick="showSection('ventas')" class="nav-btn p-4 flex flex-col items-center flex-1 min-w-[70px] tab-active" id="btn-ventas">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i><span class="text-[10px] mt-1 uppercase font-bold">Ventas</span>
            </button>
            <button onclick="showSection('productos')" class="nav-btn p-4 flex flex-col items-center flex-1 min-w-[70px]" id="btn-productos">
                <i data-lucide="package" class="w-5 h-5"></i><span class="text-[10px] mt-1 uppercase font-bold">Stock</span>
            </button>
            <button onclick="showSection('reportes')" class="nav-btn p-4 flex flex-col items-center flex-1 min-w-[70px]" id="btn-reportes">
                <i data-lucide="bar-chart-big" class="w-5 h-5"></i><span class="text-[10px] mt-1 uppercase font-bold">Reportes</span>
            </button>
            <button onclick="showSection('sistema')" class="nav-btn p-4 flex flex-col items-center flex-1 min-w-[70px]" id="btn-sistema">
                <i data-lucide="settings-2" class="w-5 h-5"></i><span class="text-[10px] mt-1 uppercase font-bold">Sistema</span>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 pb-20 w-full overflow-x-hidden">
        <section id="sec-ventas" class="section-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                        <h2 class="text-xl font-extrabold text-slate-800">Venta Rápida</h2>
                        <div class="relative w-full sm:w-64">
                            <input type="text" id="busqueda-venta" onkeyup="renderVentaRapida()" placeholder="Buscar producto..." class="w-full pl-10 pr-4 py-2 border rounded-full text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            <i data-lucide="search" class="absolute left-3.5 top-2.5 w-4 h-4 text-slate-400"></i>
                        </div>
                    </div>
                    <div id="grid-productos-venta" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-xl border h-fit lg:sticky lg:top-24">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold">Carrito</h2>
                        <span id="cart-count" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">0 ítems</span>
                    </div>
                    <div id="carrito-items" class="space-y-3 mb-6 max-h-80 overflow-y-auto pr-2"></div>
                    <div class="border-t border-dashed pt-4">
                        <div class="mb-4">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Método de Pago</label>
                            <select id="metodo-pago" class="w-full p-2 bg-slate-50 border rounded-xl font-bold outline-none text-sm">
                                <option value="Efectivo">Efectivo</option>
                                <option value="Transferencia">Transferencia</option>
                            </select>
                        </div>
                        <div class="flex justify-between text-2xl font-black text-blue-700 mb-6">
                            <span>TOTAL</span>
                            <span id="total-carrito">$0,00</span>
                        </div>
                        <button onclick="finalizarVentaProceso()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg flex justify-center items-center gap-2 active:scale-95 transition-all">
                            <i data-lucide="save"></i> Registrar Venta
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-productos" class="section-content hidden">
            <div class="bg-white p-6 rounded-3xl shadow-sm border mb-6">
                <h2 id="titulo-form-prod" class="text-xl font-bold mb-4">Gestión de Producto</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                    <input type="text" id="p-id" placeholder="ID" class="p-3 bg-slate-50 border rounded-xl outline-none w-full">
                    <input type="text" id="p-nombre" placeholder="Nombre" class="p-3 bg-slate-50 border rounded-xl outline-none w-full">
                    <input type="number" id="p-costo" placeholder="Costo Unit." step="0.01" class="p-3 bg-slate-50 border rounded-xl outline-none w-full">
                    <input type="number" id="p-costo-op" placeholder="Costo Op." step="0.01" class="p-3 bg-slate-50 border rounded-xl outline-none w-full">
                    <input type="number" id="p-precio" placeholder="P. Venta" step="0.01" class="p-3 bg-slate-50 border rounded-xl outline-none w-full">
                </div>
                <div class="flex gap-2 mt-6">
                    <button id="btn-guardar-prod" onclick="guardarProducto()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700">Guardar</button>
                    <button onclick="limpiarFormularioProd()" class="bg-slate-100 text-slate-500 px-8 py-3 rounded-xl font-bold">Cancelar</button>
                </div>
            </div>
            <div class="mb-4">
                <input type="text" id="busqueda-prod" onkeyup="renderListaProductos()" placeholder="🔍 Buscar producto..." class="w-full p-4 border rounded-2xl outline-none">
            </div>
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <div class="table-container">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-50 border-b">
                            <tr class="text-[11px] text-slate-400 uppercase tracking-widest">
                                <th class="p-4">ID</th><th class="p-4">Producto</th><th class="p-4 text-center">Costo</th><th class="p-4 text-center">Precio</th><th class="p-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-reportes" class="section-content hidden">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-6 text-center">
                <div class="bg-white p-3 rounded-2xl border text-xs font-bold"><p class="text-slate-400">Kg Vendidos</p><p id="rep-kg">0</p></div>
                <div class="bg-white p-3 rounded-2xl border text-xs font-bold"><p class="text-slate-400">Efectivo</p><p id="rep-efectivo" class="text-emerald-600">$0</p></div>
                <div class="bg-white p-3 rounded-2xl border text-xs font-bold"><p class="text-slate-400">Transferencia</p><p id="rep-transferencia" class="text-purple-600">$0</p></div>
                <div class="bg-white p-3 rounded-2xl border text-xs font-bold"><p class="text-slate-400">Costo Prod.</p><p id="rep-costo" class="text-red-400">$0</p></div>
                <div class="bg-white p-3 rounded-2xl border text-xs font-bold"><p class="text-slate-400">Costo Op.</p><p id="rep-operativo" class="text-orange-400">$0</p></div>
                <div class="bg-green-600 p-3 rounded-2xl text-white font-bold col-span-2 lg:col-span-1"><p>Ganancia Neta</p><p id="rep-ganancia">$0</p></div>
            </div>
            <div class="bg-white p-4 rounded-2xl border mb-6 flex flex-col sm:flex-row gap-4 items-end">
                <input type="text" id="f-busqueda" placeholder="Buscar..." class="w-full p-2 border rounded-lg text-sm">
                <input type="date" id="f-inicio" class="w-full p-2 border rounded-lg text-sm">
                <input type="date" id="f-fin" class="w-full p-2 border rounded-lg text-sm">
                <button onclick="filtrarReportes()" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold">Filtrar</button>
            </div>
            <div id="detalle-ventas-reporte" class="space-y-3">
                </div>
        </section>

        <section id="sec-sistema" class="section-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl border">
                    <h3 class="font-bold mb-4 text-blue-600">Configuración Ticket</h3>
                    <div class="space-y-3">
                        <input type="text" id="conf-titulo" placeholder="Nombre" class="w-full p-3 border rounded-xl">
                        <textarea id="conf-cabecera" placeholder="Cabecera" class="w-full p-3 border rounded-xl h-20"></textarea>
                        <input type="text" id="conf-pie1" placeholder="Pie 1" class="w-full p-3 border rounded-xl">
                        <input type="text" id="conf-pie2" placeholder="Pie 2" class="w-full p-3 border rounded-xl">
                        <button onclick="guardarConfig()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Guardar</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-4 text-xs font-bold uppercase">
                    <button onclick="exportarDatos()" class="bg-white border p-6 rounded-3xl flex flex-col items-center"><i data-lucide="download-cloud" class="mb-2"></i>Exportar JSON</button>
                    <div class="bg-white border p-6 rounded-3xl flex flex-col items-center relative cursor-pointer"><i data-lucide="upload-cloud" class="mb-2"></i>Importar Respaldo<input type="file" onchange="importarDatos(event)" class="absolute inset-0 opacity-0 cursor-pointer"></div>
                    <button onclick="limpiarRegistros()" class="bg-white border p-6 rounded-3xl text-red-500"><i data-lucide="trash-2" class="mb-2 mx-auto"></i>Borrar Todo</button>
                    <button onclick="exportarExcel()" class="bg-white border p-6 rounded-3xl text-emerald-600"><i data-lucide="file-spreadsheet" class="mb-2 mx-auto"></i>Exportar Excel</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-calculo" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-6 w-full max-sm">
            <h3 id="modal-titulo" class="text-2xl font-black mb-1"></h3>
            <p id="modal-precio-info" class="text-blue-600 font-bold mb-6 text-sm"></p>
            <div class="space-y-6">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Peso (KG)</label><input type="number" id="calc-peso" oninput="actualizarCalc('peso')" step="0.001" class="w-full text-3xl p-4 bg-slate-50 border-2 rounded-3xl font-black outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Importe ($)</label><input type="number" id="calc-importe" oninput="actualizarCalc('importe')" step="0.01" class="w-full text-3xl p-4 bg-slate-50 border-2 rounded-3xl font-black outline-none"></div>
                <div class="flex gap-3 pt-4">
                    <button onclick="cerrarModal()" class="flex-1 font-bold text-slate-400">Cerrar</button>
                    <button onclick="confirmarAgregarAlCarrito()" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-3xl">AGREGAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = {
            productos: JSON.parse(localStorage.getItem('pos_v121_prod')) || [],
            ventas: JSON.parse(localStorage.getItem('pos_v121_ventas')) || [],
            config: JSON.parse(localStorage.getItem('pos_v121_conf')) || { titulo: 'MI NEGOCIO', cabecera: 'Dir. Comercial', pie1: 'Gracias', pie2: 'IVA RI' }
        };
        let carrito = [];
        let productoTemporal = null;
        let editandoId = null;

        const save = () => {
            localStorage.setItem('pos_v121_prod', JSON.stringify(db.productos));
            localStorage.setItem('pos_v121_ventas', JSON.stringify(db.ventas));
            localStorage.setItem('pos_v121_conf', JSON.stringify(db.config));
        };

        const aFechaSimple = (iso) => new Date(iso).toISOString().split('T')[0];
        const fMoneda = (v) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(v);

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + id).classList.add('tab-active');
            if (id === 'sistema') cargarConfigInputs();
            if (id === 'reportes') filtrarReportes();
            lucide.createIcons();
        }

        function guardarProducto() {
            const id = document.getElementById('p-id').value.trim();
            const nombre = document.getElementById('p-nombre').value.trim();
            const costo = parseFloat(document.getElementById('p-costo').value) || 0;
            const costoOp = parseFloat(document.getElementById('p-costo-op').value) || 0;
            const precio = parseFloat(document.getElementById('p-precio').value) || 0;
            if(!id || !nombre || precio <= 0) return alert("Complete los campos.");
            const existeId = db.productos.find(p => p.id === id);
            if (editandoId === null && existeId) return alert("Error: El ID ya existe.");
            if (editandoId !== null && id !== editandoId && existeId) return alert("ID ya usado por otro producto.");
            const pData = { id, nombre, costo, costoOp, precio };
            if (editandoId !== null) {
                const idx = db.productos.findIndex(p => p.id === editandoId);
                db.productos[idx] = pData;
            } else { db.productos.push(pData); }
            save(); limpiarFormularioProd(); renderListaProductos(); renderVentaRapida();
        }

        function renderListaProductos() {
            const b = document.getElementById('busqueda-prod').value.toLowerCase();
            const f = db.productos.filter(p => p.nombre.toLowerCase().includes(b) || p.id.toLowerCase().includes(b));
            document.getElementById('tabla-productos').innerHTML = f.map(p => `
                <tr class="border-b text-xs"><td class="p-4">${p.id}</td><td class="p-4 font-bold">${p.nombre}</td>
                <td class="p-4 text-center">${fMoneda(p.costo)}</td><td class="p-4 text-center font-black">${fMoneda(p.precio)}</td>
                <td class="p-4 text-right flex gap-2 justify-end">
                    <button onclick="cargarProductoEdicion('${p.id}')" class="p-2 bg-blue-50 text-blue-600 rounded">Editar</button>
                    <button onclick="eliminarProducto('${p.id}')" class="p-2 bg-red-50 text-red-500 rounded">Borrar</button>
                </td></tr>`).join('');
        }

        function eliminarProducto(id) { if(confirm("¿Borrar?")) { db.productos = db.productos.filter(p => p.id !== id); save(); renderListaProductos(); renderVentaRapida(); } }
        function limpiarFormularioProd() { 
            editandoId = null; const inputId = document.getElementById('p-id');
            inputId.value = ""; inputId.disabled = false; inputId.classList.remove('bg-gray-200');
            document.getElementById('p-nombre').value = ""; document.getElementById('p-costo').value = ""; 
            document.getElementById('p-costo-op').value = ""; document.getElementById('p-precio').value = ""; 
            document.getElementById('titulo-form-prod').innerText = "Gestión"; 
        }
        function cargarProductoEdicion(id) { 
            const p = db.productos.find(x => x.id === id); if(!p) return; editandoId = id; 
            const inputId = document.getElementById('p-id'); inputId.value = p.id; inputId.disabled = true; inputId.classList.add('bg-gray-200');
            document.getElementById('p-nombre').value = p.nombre; document.getElementById('p-costo').value = p.costo; 
            document.getElementById('p-costo-op').value = p.costoOp; document.getElementById('p-precio').value = p.precio; 
            document.getElementById('titulo-form-prod').innerText = "Editando: " + p.nombre; window.scrollTo(0,0); 
        }

        function renderVentaRapida() {
            const b = document.getElementById('busqueda-venta').value.toLowerCase();
            const f = db.productos.filter(p => p.nombre.toLowerCase().includes(b) || p.id.toLowerCase().includes(b));
            document.getElementById('grid-productos-venta').innerHTML = f.map(p => `
                <button onclick="abrirCalculo('${p.id}')" class="bg-white p-4 rounded-3xl border text-center shadow-sm">
                    <p class="font-extrabold text-sm mb-1">${p.nombre}</p><p class="text-blue-600 font-black text-xs">${fMoneda(p.precio)}</p>
                </button>`).join('');
        }

        function abrirCalculo(id) { productoTemporal = db.productos.find(p => p.id === id); document.getElementById('modal-titulo').innerText = productoTemporal.nombre; document.getElementById('modal-precio-info').innerText = fMoneda(productoTemporal.precio) + " x KG"; document.getElementById('calc-peso').value = ""; document.getElementById('calc-importe').value = ""; document.getElementById('modal-calculo').classList.replace('hidden', 'flex'); setTimeout(()=>document.getElementById('calc-peso').focus(), 100); }
        function cerrarModal() { document.getElementById('modal-calculo').classList.replace('flex', 'hidden'); }
        function actualizarCalc(t) { const pr = productoTemporal.precio; if(t === 'peso') { const p = parseFloat(document.getElementById('calc-peso').value) || 0; document.getElementById('calc-importe').value = (p * pr).toFixed(2); } else { const i = parseFloat(document.getElementById('calc-importe').value) || 0; document.getElementById('calc-peso').value = (i / pr).toFixed(3); } }

        function confirmarAgregarAlCarrito() {
            const p = parseFloat(document.getElementById('calc-peso').value);
            const i = parseFloat(document.getElementById('calc-importe').value);
            if(p > 0) {
                carrito.push({ ...productoTemporal, pesoSeleccionado: p, importeFinal: i, costoBaseTotal: productoTemporal.costo * p, gastoOpTotal: productoTemporal.costoOp * p });
                renderCarrito(); cerrarModal();
            }
        }

        function renderCarrito() {
            let t = 0;
            document.getElementById('carrito-items').innerHTML = carrito.map((it, idx) => {
                t += it.importeFinal;
                return `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl text-xs"><div><p class="font-bold">${it.nombre}</p><p class="text-slate-400">${it.pesoSeleccionado.toFixed(3)} KG</p></div><div class="text-right"><p class="font-black text-blue-600">${fMoneda(it.importeFinal)}</p><button onclick="eliminarDelCarrito(${idx})" class="text-red-400 text-[9px] font-bold">Quitar</button></div></div>`;
            }).join('');
            document.getElementById('total-carrito').innerText = fMoneda(t);
            document.getElementById('cart-count').innerText = carrito.length + " ítems";
        }
        function eliminarDelCarrito(i) { carrito.splice(i, 1); renderCarrito(); }

        function finalizarVentaProceso() {
            if(!carrito.length) return alert("Vacío");
            const v = { id: Date.now(), fecha: new Date().toISOString(), items: [...carrito], total: Math.round(carrito.reduce((a,b)=>a+b.importeFinal,0)), metodo: document.getElementById('metodo-pago').value };
            db.ventas.push(v); save();
            const idVenta = v.id; carrito = []; renderCarrito();
            if(confirm("Venta Registrada. ¿Enviar ticket por WhatsApp?")) compartirWhatsApp(idVenta);
        }

        function filtrarReportes() {
            const ini = document.getElementById('f-inicio').value;
            const fin = document.getElementById('f-fin').value;
            const b = document.getElementById('f-busqueda').value.toLowerCase();
            let k=0, i=0, c=0, o=0, h="", efec=0, trans=0;

            [...db.ventas].reverse().forEach(v => {
                const fv = aFechaSimple(v.fecha);
                const hora = new Date(v.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if((ini && fv < ini) || (fin && fv > fin)) return;
                const tieneProducto = v.items.some(it => it.nombre.toLowerCase().includes(b));
                if(b && !tieneProducto) return;

                if(v.metodo === "Efectivo") efec += v.total; else trans += v.total;
                v.items.forEach(it => { k += it.pesoSeleccionado; i += it.importeFinal; c += it.costoBaseTotal || 0; o += it.gastoOpTotal || 0; });

                h += `
                <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                    <div onclick="toggleTicket('${v.id}')" class="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                        <div class="text-left">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${fv} - ${hora}</p>
                            <p class="font-black text-slate-700">Ticket #${v.id.toString().slice(-4)}</p>
                            <p class="text-[10px] bg-slate-100 px-2 py-0.5 rounded-full inline-block mt-1">${v.metodo}</p>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <div class="mr-2">
                                <p class="font-black text-blue-600">${fMoneda(v.total)}</p>
                                <p class="text-[10px] text-slate-400">${v.items.length} ítems</p>
                            </div>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-300"></i>
                        </div>
                    </div>
                    <div id="det-${v.id}" class="hidden bg-slate-50 border-t p-4">
                        <table class="w-full text-[11px] mb-4">
                            ${v.items.map(it => `<tr><td class="py-1 font-bold">${it.nombre}</td><td class="text-center">${it.pesoSeleccionado.toFixed(3)}kg</td><td class="text-right">${fMoneda(it.importeFinal)}</td></tr>`).join('')}
                        </table>
                        <button onclick="compartirWhatsApp('${v.id}')" class="w-full bg-emerald-500 text-white py-2 rounded-xl font-bold text-xs flex justify-center items-center gap-2">
                            <i data-lucide="message-circle" class="w-4 h-4"></i> Compartir WhatsApp
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('rep-kg').innerText = k.toFixed(2);
            document.getElementById('rep-efectivo').innerText = fMoneda(efec);
            document.getElementById('rep-transferencia').innerText = fMoneda(trans);
            document.getElementById('rep-costo').innerText = fMoneda(c);
            document.getElementById('rep-operativo').innerText = fMoneda(o);
            document.getElementById('rep-ganancia').innerText = fMoneda(i-(c+o));
            document.getElementById('detalle-ventas-reporte').innerHTML = h || '<p class="text-center p-8 text-slate-400 text-xs">Sin registros</p>';
            lucide.createIcons();
        }

        function toggleTicket(id) { document.getElementById('det-' + id).classList.toggle('hidden'); }

        function compartirWhatsApp(id) {
    const v = db.ventas.find(x => x.id == id);
    if (!v) return;

    const f = new Date(v.fecha).toLocaleDateString();
    const h = new Date(v.fecha).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    // Armado del mensaje usando la configuración del sistema
    let m = `*${db.config.titulo}*\n`; // Nombre del negocio
    if (db.config.cabecera) m += `_${db.config.cabecera}_\n`; // Dirección o subtítulo
    m += `--------------------------\n`;
    m += `📅 ${f} ${h}\n`;
    m += `💳 Pago: ${v.metodo}\n`;
    m += `--------------------------\n`;

    v.items.forEach(it => {
        m += `• ${it.nombre}\n`;
        m += `  ${it.pesoSeleccionado.toFixed(3)}kg x ${fMoneda(it.precio)} = *${fMoneda(it.importeFinal)}*\n`;
    });

    m += `--------------------------\n`;
    m += `*TOTAL: ${fMoneda(v.total)}*\n`;
    m += `--------------------------\n`;
    
    if (db.config.pie1) m += `${db.config.pie1}\n`; // Gracias por su compra
    if (db.config.pie2) m += `_${db.config.pie2}_`; // IVA o redes sociales

    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(m)}`, '_blank');
}


        function cargarConfigInputs() { document.getElementById('conf-titulo').value = db.config.titulo; document.getElementById('conf-cabecera').value = db.config.cabecera; document.getElementById('conf-pie1').value = db.config.pie1; document.getElementById('conf-pie2').value = db.config.pie2; }
        function guardarConfig() {
    db.config = {
        titulo: document.getElementById('conf-titulo').value.toUpperCase(),
        cabecera: document.getElementById('conf-cabecera').value,
        pie1: document.getElementById('conf-pie1').value,
        pie2: document.getElementById('conf-pie2').value
    };
    save();
    alert("Configuración de ticket guardada. Se aplicará a los próximos envíos.");
}

        function exportarDatos() { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); a.download = `RESPALDO.json`; a.click(); }
        function importarDatos(e) { const r = new FileReader(); r.onload = (x) => { db = JSON.parse(x.target.result); save(); location.reload(); }; r.readAsText(e.target.files[0]); }
        function limpiarRegistros() { if(confirm("Borrar todo?")) { db.ventas=[]; save(); location.reload(); } }
        function exportarExcel() {
            if (!db.ventas.length) return alert("Sin datos.");
            const wb = XLSX.utils.book_new();
            const ws_prod = XLSX.utils.json_to_sheet(db.productos); XLSX.utils.book_append_sheet(wb, ws_prod, "Productos");
            const vA = db.ventas.flatMap(v => v.items.map(it => ({ Fecha: aFechaSimple(v.fecha), Ticket: v.id, Metodo: v.metodo, Producto: it.nombre, KG: it.pesoSeleccionado, Importe: it.importeFinal, Total_Ticket: v.total })));
            const ws_ventas = XLSX.utils.json_to_sheet(vA); XLSX.utils.book_append_sheet(wb, ws_ventas, "Ventas");
            XLSX.writeFile(wb, `Reporte_POS_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        window.onload = () => { lucide.createIcons(); renderVentaRapida(); renderListaProductos(); };
    </script>
